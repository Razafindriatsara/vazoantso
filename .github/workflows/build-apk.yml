name: Build APK Android

on:
  workflow_dispatch:        # lancement manuel depuis l'onglet Actions
  push:
    tags:
      - 'v*'                # ou en poussant un tag ex: v1.0.0

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Générer les dossiers de plateforme
        run: flutter create . --org com.vazoantso --project-name vazoantso --platforms android,ios

      - name: Dépendances
        run: flutter pub get

      - name: Icône de l'application
        run: dart run flutter_launcher_icons

      - name: Compiler l'APK
        run: flutter build apk --release

      - name: Renommer l'APK
        run: cp build/app/outputs/flutter-apk/app-release.apk VazoAntso.apk

      - name: Publier l'APK (artefact)
        uses: actions/upload-artifact@v4
        with:
          name: VazoAntso-APK
          path: VazoAntso.apk

      - name: Publier une Release GitHub (si tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: VazoAntso.apk
          generate_release_notes: true
